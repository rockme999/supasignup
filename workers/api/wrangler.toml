name = "bg-api"
main = "src/index.ts"
compatibility_date = "2026-03-01"

[triggers]
crons = ["0 * * * *"]

# ══════════════════════════════════════════════════════════════
# 프로덕션 (기본) — npx wrangler deploy
# ══════════════════════════════════════════════════════════════

[[routes]]
pattern = "bg.suparain.kr"
custom_domain = true

[vars]
BASE_URL = "https://bg.suparain.kr"

# D1 Database (프로덕션)
[[d1_databases]]
binding = "DB"
database_name = "bg-production"
database_id = "254438d7-b1b1-45a1-afe1-2c766aba252b"
migrations_dir = "migrations"

# KV Namespace (프로덕션)
[[kv_namespaces]]
binding = "KV"
id = "fe38c181822b4729850b53ab839339b5"

# Workers AI (프로덕션)
[ai]
binding = "AI"

# ══════════════════════════════════════════════════════════════
# 스테이징 (개발) — npx wrangler deploy --env dev
# ══════════════════════════════════════════════════════════════

[env.dev]
name = "bg-api-dev"

# 스테이징은 cron 불필요
[env.dev.triggers]
crons = []

[[env.dev.routes]]
pattern = "bg-dev.suparain.kr"
custom_domain = true

[env.dev.vars]
BASE_URL = "https://bg-dev.suparain.kr"

# D1 Database (스테이징)
[[env.dev.d1_databases]]
binding = "DB"
database_name = "bg-dev"
database_id = "d420b951-c93b-4449-8f8c-f86c9f99a2cc"
migrations_dir = "migrations"

# KV Namespace (스테이징)
[[env.dev.kv_namespaces]]
binding = "KV"
id = "d3bc6faec4274bd3bacca408d4bf4277"

# Workers AI (스테이징)
[env.dev.ai]
binding = "AI"

# ══════════════════════════════════════════════════════════════
# Secrets (wrangler secret put 으로 등록):
# ══════════════════════════════════════════════════════════════
#
# 프로덕션:  wrangler secret put SECRET_NAME
# 스테이징:  wrangler secret put SECRET_NAME --env dev
#
# -- 카페24 (환경별 다른 앱) --
# CAFE24_CLIENT_ID, CAFE24_CLIENT_SECRET
# CAFE24_WEBHOOK_API_KEY
#
# -- 암호화 (환경별 반드시 다르게!) --
# ENCRYPTION_KEY
# JWT_SECRET
#
# -- 소셜 프로바이더 (동일 키 사용 가능, redirect_uri만 추가) --
# GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
# KAKAO_CLIENT_ID, KAKAO_CLIENT_SECRET
# NAVER_CLIENT_ID, NAVER_CLIENT_SECRET
# APPLE_CLIENT_ID, APPLE_TEAM_ID, APPLE_KEY_ID, APPLE_PRIVATE_KEY
# DISCORD_CLIENT_ID, DISCORD_CLIENT_SECRET
# TELEGRAM_BOT_TOKEN, TELEGRAM_BOT_USERNAME
#
# -- AI (Cloudflare Workers AI는 바인딩으로 처리, 아래는 REST 폴백용) --
# CF_ACCOUNT_ID, CF_AI_TOKEN

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=740">
<title>번개가입 대표이미지</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
  .card {
    width: 740px; height: 416px;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #2563eb 100%);
    border-radius: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #fff;
  }
  /* 배경 장식 */
  .card::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 300px; height: 300px;
    background: rgba(59, 130, 246, 0.15);
    border-radius: 50%;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -60px;
    width: 200px; height: 200px;
    background: rgba(99, 102, 241, 0.12);
    border-radius: 50%;
  }

  .content { position: relative; z-index: 1; text-align: center; padding: 0 60px; }

  .logo { font-size: 18px; font-weight: 700; letter-spacing: 2px; color: #60a5fa; margin-bottom: 12px; }
  .logo span { color: #fbbf24; }

  h1 { font-size: 36px; font-weight: 800; line-height: 1.3; margin-bottom: 8px; }
  h1 em { font-style: normal; color: #60a5fa; }

  .sub { font-size: 16px; color: #94a3b8; margin-bottom: 28px; line-height: 1.5; }

  .providers {
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: center;
    margin-bottom: 28px;
  }
  .provider {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.15);
    transition: transform 0.2s;
  }
  .provider svg { width: 24px; height: 24px; }
  .provider.google { background: rgba(234,67,53,0.2); border-color: rgba(234,67,53,0.4); }
  .provider.kakao { background: rgba(254,229,0,0.2); border-color: rgba(254,229,0,0.4); }
  .provider.naver { background: rgba(3,199,90,0.2); border-color: rgba(3,199,90,0.4); }
  .provider.apple { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); }
  .provider.discord { background: rgba(88,101,242,0.2); border-color: rgba(88,101,242,0.4); }
  .provider.telegram { background: rgba(38,165,219,0.2); border-color: rgba(38,165,219,0.4); }

  .badges {
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  .badge {
    background: rgba(59, 130, 246, 0.25);
    border: 1px solid rgba(96, 165, 250, 0.4);
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 600;
    color: #93c5fd;
    letter-spacing: 0.5px;
  }
  .badge strong { color: #fff; }
</style>
</head>
<body>
<div class="card">
  <div class="content">
    <div class="logo">&#9889; <span>번개가입</span></div>
    <h1>소셜 로그인 <em>1-클릭</em> 회원가입</h1>
    <p class="sub">복잡한 가입 폼 없이, 소셜 계정 하나로 즉시 가입</p>

    <div class="providers">
      <div class="provider google">
        <svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      </div>
      <div class="provider kakao">
        <svg viewBox="0 0 24 24" fill="#3C1E1E"><path d="M12 3C6.48 3 2 6.36 2 10.44c0 2.62 1.75 4.93 4.38 6.24l-1.12 4.16c-.1.36.32.65.64.44l4.83-3.2c.42.04.84.06 1.27.06 5.52 0 10-3.36 10-7.7S17.52 3 12 3z"/></svg>
      </div>
      <div class="provider naver">
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M16.27 12.97L7.48 3H3v18h4.73V11.03L16.52 21H21V3h-4.73z"/></svg>
      </div>
      <div class="provider apple">
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.51-3.23 0-1.44.64-2.2.45-3.06-.4C3.79 16.17 4.36 9.04 8.73 8.78c1.23.06 2.1.72 2.82.76.98-.2 1.92-.77 3.01-.7 1.27.1 2.23.6 2.84 1.53-2.6 1.56-1.98 4.99.47 5.95-.56 1.47-1.28 2.92-2.82 4.96zM12.03 8.7c-.15-2.34 1.84-4.37 4.03-4.57.29 2.62-2.34 4.6-4.03 4.57z"/></svg>
      </div>
      <div class="provider discord">
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M20.32 4.37a19.8 19.8 0 00-4.89-1.52.07.07 0 00-.08.04c-.21.38-.44.87-.61 1.25a18.27 18.27 0 00-5.49 0 12.64 12.64 0 00-.62-1.25.07.07 0 00-.08-.04 19.74 19.74 0 00-4.89 1.52.07.07 0 00-.03.03C1.27 8.34.59 12.18.92 15.97a.08.08 0 00.03.05 19.9 19.9 0 005.99 3.03.07.07 0 00.08-.03c.46-.63.87-1.3 1.22-2a.08.08 0 00-.04-.1 13.1 13.1 0 01-1.87-.9.08.08 0 01-.01-.12c.13-.09.25-.19.37-.29a.07.07 0 01.07-.01c3.93 1.8 8.18 1.8 12.07 0a.07.07 0 01.07.01c.12.1.25.2.37.29a.08.08 0 01-.01.12c-.6.35-1.22.65-1.87.9a.08.08 0 00-.04.1c.36.7.77 1.37 1.22 2a.07.07 0 00.08.03 19.83 19.83 0 006-3.03.08.08 0 00.03-.05c.39-4.05-.65-7.56-2.76-10.67a.06.06 0 00-.03-.03zM8.02 13.64c-1.18 0-2.16-1.08-2.16-2.42 0-1.33.96-2.42 2.16-2.42 1.21 0 2.18 1.1 2.16 2.42 0 1.34-.96 2.42-2.16 2.42zm7.97 0c-1.18 0-2.16-1.08-2.16-2.42 0-1.33.96-2.42 2.16-2.42 1.21 0 2.18 1.1 2.16 2.42 0 1.34-.95 2.42-2.16 2.42z"/></svg>
      </div>
      <div class="provider telegram">
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71L12.6 16.3l-1.99 1.93c-.23.23-.42.42-.83.42z"/></svg>
      </div>
    </div>

    <div class="badges">
      <div class="badge"><strong>설치 5분</strong> 완료</div>
      <div class="badge">고객 가입 <strong>1초</strong></div>
      <div class="badge">무료 시작</div>
    </div>
  </div>
</div>
</body>
</html>

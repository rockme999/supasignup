  <rect width="396" height="120" fill="#FFF4F4"/>

  <!-- TEXT AREA (unchanged) -->
  <text x="20" y="32" font-family="Noto Sans CJK KR, sans-serif" font-size="14" font-weight="400" fill="#6B7280" letter-spacing="-0.4">월 <tspan fill="#E91E63" font-weight="700">0원</tspan>, <tspan fill="#E91E63" font-weight="700">무료</tspan>로 시작하세요</text>
  <text x="20" y="68" font-family="Noto Sans CJK KR, sans-serif" font-size="26" font-weight="700" fill="#1F2937" letter-spacing="-1.2">회원가입이</text>
  <text x="20" y="100" font-family="Noto Sans CJK KR, sans-serif" font-size="26" font-weight="700" letter-spacing="-1.2"><tspan fill="#E91E63">번개처럼</tspan> <tspan fill="#1F2937">끝난다</tspan></text>

  <!-- ============ IMG AREA — Variant D: Back Cluster ============ -->
  <!-- 26px 큰 로고, 매우 타이트하게 클러스터, 서로 겹침, opacity 0.45 -->
  <ellipse cx="320" cy="60" rx="60" ry="54" fill="url(#boltGlow1)"/>

  <!-- BACK: large clustered icons overlapping each other -->
  <g opacity="0.45">
    <!-- Discord far-left back -->
    <circle cx="280" cy="55" r="15" fill="#5865F2"/>
    <use href="#ic-discord" x="267.5" y="42.5" width="25" height="25"/>
    <!-- Telegram below-left -->
    <circle cx="296" cy="86" r="14" fill="#0088CC"/>
    <use href="#ic-telegram" x="284.5" y="74.5" width="23" height="23"/>
    <!-- Google top -->
    <circle cx="318" cy="28" r="15" fill="#fff" stroke="#D1D5DB" stroke-width="0.8"/>
    <use href="#ic-google" x="305.5" y="15.5" width="25" height="25"/>
    <!-- Kakao top-right -->
    <circle cx="346" cy="38" r="13" fill="#FEE500"/>
    <use href="#ic-kakao" x="335.5" y="27.5" width="21" height="21"/>
    <!-- Naver right -->
    <circle cx="362" cy="62" r="14" fill="#03C75A"/>
    <use href="#ic-naver" x="350.5" y="50.5" width="23" height="23"/>
    <!-- Apple bottom -->
    <circle cx="338" cy="92" r="14" fill="#0a0a0a"/>
    <use href="#ic-apple" x="326.5" y="80.5" width="23" height="23"/>
  </g>

  <!-- FRONT: BIG dominant bolt -->
  <path d="M 322,10 L 290,58 L 316,58 L 312,110 L 350,56 L 324,56 L 322,10 Z"
        fill="#000" opacity="0.30" transform="translate(2,3)"/>
  <path d="M 322,10 L 290,58 L 316,58 L 312,110 L 350,56 L 324,56 L 322,10 Z"
        fill="url(#bolt1)" stroke="#FF8F00" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round"/>
</svg>

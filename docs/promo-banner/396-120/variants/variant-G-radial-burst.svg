<svg width="396" height="120" viewBox="0 0 396 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="boltMain" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="40%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <radialGradient id="glowOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFC107" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFC107" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="396" height="120" fill="#FFF4F4"/>

  <!-- TEXT AREA (unchanged) -->
  <text x="20" y="32" font-family="Noto Sans CJK KR, sans-serif" font-size="14" font-weight="400" fill="#6B7280" letter-spacing="-0.4">월 <tspan fill="#E91E63" font-weight="700">0원</tspan>, <tspan fill="#E91E63" font-weight="700">무료</tspan>로 시작하세요</text>
  <text x="20" y="68" font-family="Noto Sans CJK KR, sans-serif" font-size="26" font-weight="700" fill="#1F2937" letter-spacing="-1.2">회원가입이</text>
  <text x="20" y="100" font-family="Noto Sans CJK KR, sans-serif" font-size="26" font-weight="700" letter-spacing="-1.2"><tspan fill="#E91E63">번개처럼</tspan> <tspan fill="#1F2937">끝난다</tspan></text>

  <!-- ============ IMG AREA — Variant G: Radial Burst ============ -->
  <ellipse cx="320" cy="60" rx="65" ry="58" fill="url(#glowOuter)"/>

  <!-- Radial rays around bolt (12 thin lines) -->
  <g stroke="#FFB300" stroke-linecap="round" opacity="0.55">
    <!-- Top -->
    <line x1="320" y1="6" x2="320" y2="20" stroke-width="2"/>
    <!-- Top-right diag -->
    <line x1="358" y1="22" x2="350" y2="32" stroke-width="1.6"/>
    <!-- Right -->
    <line x1="382" y1="60" x2="368" y2="60" stroke-width="2"/>
    <!-- Bottom-right diag -->
    <line x1="362" y1="98" x2="354" y2="88" stroke-width="1.6"/>
    <!-- Bottom -->
    <line x1="320" y1="116" x2="320" y2="100" stroke-width="2"/>
    <!-- Bottom-left diag -->
    <line x1="278" y1="98" x2="286" y2="88" stroke-width="1.6"/>
    <!-- Left -->
    <line x1="258" y1="60" x2="272" y2="60" stroke-width="2"/>
    <!-- Top-left diag -->
    <line x1="282" y1="22" x2="290" y2="32" stroke-width="1.6"/>
  </g>

  <!-- Smaller rays in between -->
  <g stroke="#FFD54F" stroke-linecap="round" opacity="0.45" stroke-width="1.2">
    <line x1="345" y1="14" x2="340" y2="22"/>
    <line x1="372" y1="40" x2="362" y2="44"/>
    <line x1="372" y1="80" x2="362" y2="76"/>
    <line x1="345" y1="106" x2="340" y2="98"/>
    <line x1="295" y1="106" x2="300" y2="98"/>
    <line x1="268" y1="80" x2="278" y2="76"/>
    <line x1="268" y1="40" x2="278" y2="44"/>
    <line x1="295" y1="14" x2="300" y2="22"/>
  </g>

  <!-- Cast shadow -->
  <path d="M 326,18 L 290,58 L 316,58 L 310,104 L 354,56 L 328,56 L 326,18 Z"
        fill="#000" opacity="0.22" transform="translate(3,4)"/>

  <!-- Main bolt -->
  <path d="M 326,18 L 290,58 L 316,58 L 310,104 L 354,56 L 328,56 L 326,18 Z"
        fill="url(#boltMain)" stroke="#E65100" stroke-width="0.9" stroke-linejoin="round" stroke-linecap="round"/>
</svg>

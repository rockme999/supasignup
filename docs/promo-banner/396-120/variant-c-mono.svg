  <!-- premium dark bg -->
  <rect width="475" height="144" fill="url(#bgC)"/>

  <!-- thin gold border -->
  <rect x="0.5" y="0.5" width="474" height="143" fill="none" stroke="#FACC15" stroke-opacity="0.25" stroke-width="1"/>

  <!-- giant decorative typo "ONE-CLICK" watermark -->
  <text x="155" y="118" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
        font-size="92" font-weight="900" fill="url(#bigText)" letter-spacing="-5">ONE CLICK</text>

  <!-- bolt glow -->
  <ellipse cx="80" cy="72" rx="55" ry="50" fill="url(#glowC)"/>

  <!-- bolt -->
  <path d="M 92,28 L 56,74 L 78,74 L 68,116 L 104,66 L 84,66 L 92,28 Z"
        fill="url(#boltC)" stroke="#FACC15" stroke-width="1" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- top thin tag -->
  <g transform="translate(150, 22)">
    <g color="#FACC15"><use href="#bolt-mini-c" width="14" height="14"/></g>
    <text x="20" y="11" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
          font-size="11" font-weight="800" fill="#FACC15" letter-spacing="0.5">번개가입 · CAFE24 공식 앱</text>
  </g>

  <!-- main copy: huge bold typo -->
  <text x="150" y="72" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
        font-size="26" font-weight="900" fill="#FFFFFF" letter-spacing="-1.5">소셜 가입을, <tspan fill="#FACC15">원클릭</tspan>으로</text>

  <!-- sub copy -->
  <text x="150" y="92" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
        font-size="12" font-weight="500" fill="#9CA3AF" letter-spacing="-0.3">월 0원 무료 시작 · 무제한 가입</text>

  <!-- social icons row -->
  <g transform="translate(150, 110)">
    <circle cx="9" cy="9" r="9" fill="#fff"/>
    <use href="#ic-google-c" x="2" y="2" width="14" height="14"/>
    <circle cx="32" cy="9" r="9" fill="#FEE500"/>
    <use href="#ic-kakao-c" x="25" y="2" width="14" height="14"/>
    <circle cx="55" cy="9" r="9" fill="#03C75A"/>
    <use href="#ic-naver-c" x="48" y="2" width="14" height="14"/>
    <circle cx="78" cy="9" r="9" fill="#0a0a0a"/>
    <use href="#ic-apple-c" x="71" y="2" width="14" height="14"/>
    <circle cx="101" cy="9" r="9" fill="#5865F2"/>
    <use href="#ic-discord-c" x="94" y="2" width="14" height="14"/>
    <circle cx="124" cy="9" r="9" fill="#0088CC"/>
    <use href="#ic-telegram-c" x="117" y="2" width="14" height="14"/>
  </g>

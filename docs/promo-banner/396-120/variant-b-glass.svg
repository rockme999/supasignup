  <!-- gradient bg -->
  <rect width="475" height="144" fill="url(#bgB)"/>

  <!-- decorative blurry circles for glass mood -->
  <circle cx="40" cy="30" r="50" fill="#FFFFFF" opacity="0.10"/>
  <circle cx="430" cy="120" r="60" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="420" cy="20" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="450" cy="50" r="2" fill="#fff" opacity="0.4"/>

  <!-- bolt glow -->
  <ellipse cx="80" cy="72" rx="55" ry="50" fill="url(#glowB)"/>

  <!-- bolt -->
  <path d="M 92,28 L 56,74 L 78,74 L 68,116 L 104,66 L 84,66 L 92,28 Z"
        fill="url(#boltB)" stroke="#FFE082" stroke-width="1" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- GLASS CARD on right side -->
  <g>
    <rect x="142" y="18" width="318" height="108" rx="14" fill="url(#glassB)" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="1"/>
  </g>

  <!-- 번개가입 brand badge -->
  <g transform="translate(160, 32)">
    <rect x="0" y="0" width="100" height="24" rx="12" fill="#FFFFFF"/>
    <g transform="translate(7, 4)" color="#7C3AED"><use href="#bolt-mini-b" width="16" height="16"/></g>
    <text x="58" y="17" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
          font-size="14" font-weight="900" fill="#7C3AED" text-anchor="middle" letter-spacing="-0.5">번개가입</text>
  </g>

  <!-- main copy -->
  <text x="160" y="84" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
        font-size="22" font-weight="900" fill="#FFFFFF" letter-spacing="-1.2">소셜 원클릭으로, 가입 완료</text>

  <!-- social icons row -->
  <g transform="translate(160, 100)">
    <circle cx="9" cy="9" r="9" fill="#fff"/>
    <use href="#ic-google-b" x="2" y="2" width="14" height="14"/>
    <circle cx="32" cy="9" r="9" fill="#FEE500"/>
    <use href="#ic-kakao-b" x="25" y="2" width="14" height="14"/>
    <circle cx="55" cy="9" r="9" fill="#03C75A"/>
    <use href="#ic-naver-b" x="48" y="2" width="14" height="14"/>
    <circle cx="78" cy="9" r="9" fill="#0a0a0a"/>
    <use href="#ic-apple-b" x="71" y="2" width="14" height="14"/>
    <circle cx="101" cy="9" r="9" fill="#5865F2"/>
    <use href="#ic-discord-b" x="94" y="2" width="14" height="14"/>
    <circle cx="124" cy="9" r="9" fill="#0088CC"/>
    <use href="#ic-telegram-b" x="117" y="2" width="14" height="14"/>
    <text x="148" y="13" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
          font-size="11" font-weight="600" fill="#FFFFFF" letter-spacing="-0.3" opacity="0.85">+ 6종 지원</text>
  </g>

  <!-- 카페24 official tag -->
  <g transform="translate(360, 32)">
    <rect x="0" y="0" width="92" height="22" rx="11" fill="#FFFFFF" opacity="0.95"/>
    <text x="46" y="15" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
          font-size="11" font-weight="800" fill="#7C3AED" text-anchor="middle" letter-spacing="-0.3">CAFE24 공식 앱</text>
  </g>

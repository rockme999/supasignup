<svg width="396" height="120" viewBox="0 0 396 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="boltMain" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="40%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <radialGradient id="glowOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFC107" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#FFC107" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background (Cafe24 guide BG: blue) -->
  <rect width="396" height="120" fill="#F4F9FF"/>

  <!-- ============ TEXT AREA (left) ============ -->
  <text x="20" y="32" font-family="Noto Sans CJK KR, sans-serif"
        font-size="14" font-weight="400" fill="#475569" letter-spacing="-0.4">소셜 <tspan fill="#1E3A8A" font-weight="700">6종</tspan>, <tspan fill="#1E3A8A" font-weight="700">1클릭</tspan>으로 가입</text>
  <text x="20" y="68" font-family="Noto Sans CJK KR, sans-serif"
        font-size="26" font-weight="700" letter-spacing="-1.2"><tspan fill="#1E3A8A">번개처럼</tspan> <tspan fill="#0F172A">가입,</tspan></text>
  <text x="20" y="100" font-family="Noto Sans CJK KR, sans-serif"
        font-size="26" font-weight="700" fill="#0F172A" letter-spacing="-1.2">소셜 원클릭</text>

  <!-- ============ IMG AREA — Motion Echo (right→left) ============ -->
  <ellipse cx="320" cy="60" rx="62" ry="55" fill="url(#glowOuter)"/>

  <!-- Echo bolt 2 (furthest back, on right side — where bolt came from) -->
  <path d="M 326,14 L 290,58 L 316,58 L 310,108 L 354,56 L 328,56 L 326,14 Z"
        fill="url(#boltMain)" opacity="0.18" transform="translate(14, 0)"/>

  <!-- Echo bolt 1 (mid back) -->
  <path d="M 326,14 L 290,58 L 316,58 L 310,108 L 354,56 L 328,56 L 326,14 Z"
        fill="url(#boltMain)" opacity="0.38" transform="translate(7, 0)"/>

  <!-- Cast shadow (subtle, kept under main) -->
  <path d="M 326,14 L 290,58 L 316,58 L 310,108 L 354,56 L 328,56 L 326,14 Z"
        fill="#000" opacity="0.18" transform="translate(-2,4)"/>

  <!-- Main bolt (front, leading edge of motion) -->
  <path d="M 326,14 L 290,58 L 316,58 L 310,108 L 354,56 L 328,56 L 326,14 Z"
        fill="url(#boltMain)" stroke="#E65100" stroke-width="0.9" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Speed lines on right (trailing behind, indicating motion came from right) -->
  <g stroke="#FF8F00" stroke-linecap="round" opacity="0.5">
    <line x1="372" y1="36" x2="384" y2="36" stroke-width="1.5"/>
    <line x1="375" y1="64" x2="388" y2="64" stroke-width="1.5"/>
    <line x1="370" y1="92" x2="382" y2="92" stroke-width="1.5"/>
  </g>
</svg>
